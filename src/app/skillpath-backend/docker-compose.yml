version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: skillpath-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: skillpath
      POSTGRES_PASSWORD: skillpath123
      POSTGRES_DB: skillpath_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillpath -d skillpath_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: skillpath-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@skillpath.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build: .
    container_name: skillpath-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://skillpath:skillpath123@db:5432/skillpath_db
      JWT_SECRET: skillpath-super-secret-key-change-in-production-2024
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "1440"
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:5174
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  pgadmin_data:
